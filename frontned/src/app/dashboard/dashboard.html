<div class="row g-4">

    <div class="col-md-4">
        <div class="card shadow text-center p-3 bg-primary text-white">
            <h4>Patients</h4>
            <h2>{{patientsCount}}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center p-3 bg-success text-white">
            <h4>Doctors</h4>
            <h2>{{doctorsCount}}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center p-3 bg-warning text-dark">
            <h4>Appointments</h4>
            <h2>{{appointmentsCount}}</h2>
        </div>
    </div>

</div>
