<h3 class="mb-4 fw-bold">📋 Patient Records</h3>

<table class="table table-hover shadow rounded">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Disease</th>
            <th>Doctor</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        <tr *ngFor="let p of patients">
            <td>{{p.patientId}}</td>
            <td>{{p.name}}</td>
            <td>{{p.age}}</td>
            <td>{{p.disease}}</td>
            <td>{{p.doctor}}</td>

            <td>
                <a [routerLink]="['/edit', p.patientId]" class="btn btn-sm btn-warning me-2">Edit</a>
                <button (click)="delete(p.patientId)" class="btn btn-sm btn-danger">Delete</button>
            </td>
        </tr>
    </tbody>
</table>
<div *ngIf="patients.length === 0" class="text-center mt-5">
    <h5>No patients found</h5>
    <a routerLink="/add" class="btn btn-primary mt-2">Add First Patient</a>
</div>
