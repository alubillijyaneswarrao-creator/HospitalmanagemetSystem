<div class="card shadow p-4 mx-auto" style="max-width:400px">
    <h3 class="text-center mb-3">🔐 Login</h3>

    <form (ngSubmit)="login()">
        <input class="form-control mb-2" placeholder="Email" [(ngModel)]="data.email" name="email">

        <input class="form-control mb-3" type="password" placeholder="Password" [(ngModel)]="data.password"
            name="password">

        <button class="btn btn-primary w-100">Login</button>
    </form>
</div>
